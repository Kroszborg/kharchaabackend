services:
  - type: web
    name: kharchaaa-backend
    runtime: node
    region: singapore   # closest to India; change to oregon/frankfurt as needed
    plan: free          # upgrade to starter ($7/mo) for always-on

    buildCommand: npm install && npm run build
    startCommand: npm run start:migrate   # runs prisma migrate deploy then starts server

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # ── Neon DB ───────────────────────────────────────────────────
      # Set this in the Render dashboard → Environment → Add env var
      - key: DATABASE_URL
        sync: false    # marks as secret — fill in Render dashboard

      # ── JWT secrets — generate with: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      - key: JWT_ACCESS_SECRET
        sync: false

      - key: JWT_REFRESH_SECRET
        sync: false

      # ── CORS — comma-separated list of allowed origins ────────────
      # e.g. https://kharchaaa-admin.vercel.app,exp://...
      - key: CORS_ORIGIN
        sync: false
