services:
  - type: web
    name: kharchaaa-backend
    runtime: node
    region: singapore
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node dist/server.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # ── CORS — allow all origins for development
      # In production, set to your actual domains:
      # e.g. https://kharchaaa-admin.vercel.app,exp://localhost:8081
      - key: CORS_ORIGIN
        value: '*'
